<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ととのえPDF | ブラウザだけでPDFを分割・結合</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <h1>ととのえPDF</h1>
    <p class="help">ブラウザだけでPDFを分割・結合</p>

    <div class="tabs">
      <button id="tabSplit" class="tab-btn active" type="button" aria-selected="true">Split &amp; Combine</button>
      <button id="tabMerge" class="tab-btn" type="button" aria-selected="false">Interleave Merge</button>
    </div>

    <section id="mergeSection" hidden>
      <div class="grid">
        <div class="card">
          <label class="label" for="frontFile">Front PDF（表面）</label>
          <input id="frontFile" type="file" accept="application/pdf" />
          <div id="frontMeta" class="meta"></div>
          <canvas id="frontCanvas" class="preview-canvas"></canvas>
        </div>
        <div class="card">
          <label class="label" for="backFile">Back PDF（裏面）</label>
          <input id="backFile" type="file" accept="application/pdf" />
          <div id="backMeta" class="meta"></div>
          <canvas id="backCanvas" class="preview-canvas"></canvas>
        </div>
      </div>
      <p class="help">順序: Front と Back を1ページずつ交互に結合（片方が尽きたら残りを追加）</p>
      <div class="card">
        <div class="inline-options">
          <label>
            Front（表面）の順番:
            <select id="frontOrderSelect">
              <option value="asc" selected>先頭から（昇順）</option>
              <option value="desc">末尾から（降順）</option>
            </select>
          </label>
          <label>
            Back（裏面）の順番:
            <select id="backOrderSelect">
              <option value="desc" selected>末尾から（降順）</option>
              <option value="asc">先頭から（昇順）</option>
            </select>
          </label>
        </div>
      </div>
      <div class="actions">
        <button id="runMergeBtn" type="button">PDFを結合</button>
      </div>
    </section>

    <section id="splitSection">
      <div class="card">
        <label class="label" for="splitInput">入力PDF（見開きページを含むPDF）</label>
        <input id="splitInput" type="file" accept="application/pdf" />
        <div id="splitMeta" class="meta"></div>
        <canvas id="splitCanvas" class="preview-canvas"></canvas>
      </div>
      <div class="card">
        <div class="inline-options">
          <label>
            回転:
            <select id="directionSelect">
              <option value="none" selected>none (回転なし)</option>
              <option value="cw">cw (時計回り90°)</option>
              <option value="ccw">ccw (反時計回り90°)</option>
            </select>
          </label>
          <label>
            ページ順:
            <select id="orderSelect">
              <option value="LR" selected>LR (左→右)</option>
              <option value="RL">RL (右→左)</option>
            </select>
          </label>
        </div>
      </div>
      <div class="actions">
        <button id="runSplitBtn" type="button">PDFを分割</button>
      </div>
    </section>

    <div class="actions">
      <a id="downloadLink" hidden>結果PDFをダウンロード</a>
    </div>
    <div id="status" class="status"></div>

    <section class="card">
      <h2>結果サムネイル（全ページ）</h2>
      <div id="resultThumbnails" class="thumb-grid"></div>
    </section>

    <section class="card">
      <h2>結果プレビュー（詳細確認）</h2>
      <iframe id="resultPreview" title="Result PDF preview"></iframe>
    </section>

    <script type="module" src="./app.js"></script>
  </body>
</html>
